name: Carnival Corporation
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Cruise Lines
  - Travel
  - Hospitality
  - Mobile Apps
  - Loyalty
  - Wearables
description: >-
  Carnival Corporation & plc is the world's largest cruise company operating
  eight cruise line brands (Carnival Cruise Line, Princess Cruises, Holland
  America Line, Seabourn, Cunard, P&O Cruises, Costa Cruises, AIDA Cruises),
  plus the White Pass and Yukon Route. Carnival operates the OceanMedallion
  wearable IoT technology and mobile experience platform, the Carnival HUB
  app, the Princess MedallionClass app, and a portfolio of guest-facing
  digital experiences across its fleet of over 90 ships.
